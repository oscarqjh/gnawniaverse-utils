name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-profile:
    name: Test @gnawniaverse/profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd packages/profile && npm ci
      - name: Run tests
        run: cd packages/profile && npm test
      - name: Build
        run: cd packages/profile && npm run build

  test-achievements:
    name: Test @gnawniaverse/achievements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd packages/achievements && npm ci
      - name: Type check
        run: cd packages/achievements && npm run typecheck
      - name: Run tests
        run: cd packages/achievements && npm test
      - name: Build
        run: cd packages/achievements && npm run build
